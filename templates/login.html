{% extends "base.html" %}

{% block content %}
<h1>Login</h1>
<form action="/login", method="POST">
    {{ form.hidden_tag() }}
    {{ form.email.label }}
    {{ form.email() }}
    {{ form.senha.label }}
    {{ form.senha() }}
    {{ form.submit() }}
</form>

<p>Ainda não é cadastrado? </p><a href="{{ url_for('usuarios.cadastro') }}">Cadastro</a>
{% endblock %}
